<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Lens Flare — Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; }

  #flare-group {
    position: fixed;
    top: 0; left: 0;
    width: 1080px;
    height: 1920px;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
  }

  .flare-line {
    position: absolute;
    top: 40%;
    left: 0;
    width: 1080px;
    height: 3px;
    background: linear-gradient(
      to right,
      transparent 0%,
      rgba(180, 255, 255, 0.3) 10%,
      rgba(255, 255, 255, 0.9) 35%,
      rgba(200, 240, 255, 1.0) 50%,
      rgba(255, 255, 255, 0.9) 65%,
      rgba(180, 255, 255, 0.3) 90%,
      transparent 100%
    );
    box-shadow: 0 0 12px 2px rgba(200, 240, 255, 0.6);
  }

  .secondary-flare {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(180,240,255,0.3) 50%, transparent 70%);
    transform: translate(-50%, -50%);
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>
<div id="flare-group">
  <div class="flare-line"></div>
  <div class="secondary-flare" id="sf1" style="width:80px;height:80px;left:30%;top:40%;"></div>
  <div class="secondary-flare" id="sf2" style="width:120px;height:120px;left:55%;top:40%;"></div>
  <div class="secondary-flare" id="sf3" style="width:50px;height:50px;left:78%;top:40%;"></div>
</div>

<script>
  const group = document.getElementById('flare-group');

  gsap.to(group, {
    delay: 2,
    opacity: 0.8,
    duration: 0.15,
    ease: 'power1.in',
    onComplete: function() {
      gsap.to(group, {
        opacity: 0,
        duration: 0.65,
        ease: 'power2.out',
        delay: 0.1
      });
    }
  });
</script>
</body>
</html>
