<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Teal-Orange Grade — Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; }

  .grade-teal {
    position: fixed;
    top: 0; left: 0;
    width: 1080px;
    height: 60%;
    background: radial-gradient(
      ellipse 80% 70% at 50% 0%,
      rgba(0, 80, 100, 0.12) 0%,
      transparent 70%
    );
    mix-blend-mode: color;
    pointer-events: none;
    z-index: 1;
  }

  .grade-orange {
    position: fixed;
    bottom: 0; left: 0;
    width: 1080px;
    height: 40%;
    background: linear-gradient(
      to top,
      rgba(160, 70, 0, 0.10) 0%,
      rgba(140, 60, 0, 0.06) 60%,
      transparent 100%
    );
    mix-blend-mode: color;
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="grade-teal"></div>
  <div class="grade-orange"></div>
</body>
</html>
