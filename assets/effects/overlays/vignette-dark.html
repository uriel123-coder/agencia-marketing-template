<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Vignette Dark — Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; }

  .vignette {
    position: fixed;
    top: 0; left: 0;
    width: 1080px;
    height: 1920px;
    background: radial-gradient(
      ellipse 70% 85% at 50% 50%,
      transparent 50%,
      rgba(0, 0, 0, 0.40) 75%,
      rgba(0, 0, 0, 0.70) 100%
    );
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="vignette"></div>
</body>
</html>
