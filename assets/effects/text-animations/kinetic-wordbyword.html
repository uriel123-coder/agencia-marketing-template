<!-- Effect: kinetic-wordbyword | Duration: 1.2s | Energy: High | Best for: Hooks, call-outs, opening statements, reel intros -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinetic Word by Word</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    background: #151a28;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #bg-accent {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 900px;
    height: 900px;
    background: radial-gradient(circle, rgba(210,232,35,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  #text-container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 40px 60px;
    max-width: 1000px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 20px 30px;
  }
  .word {
    font-family: Arial Black, sans-serif;
    font-size: 110px;
    font-weight: 900;
    color: white;
    letter-spacing: -3px;
    display: inline-block;
    transform: scale(0);
    opacity: 0;
    will-change: transform, opacity;
    /* Each word gets its own baseline */
    line-height: 1.05;
  }
  .word.accent {
    color: #d2e823;
  }
  /* Underline decoration on last word */
  .word.underlined {
    position: relative;
  }
  .word.underlined::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 0;
    width: 0;
    height: 6px;
    background: #d2e823;
  }
  #replay-btn {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: #d2e823;
    color: #151a28;
    border: none;
    padding: 18px 48px;
    font-size: 22px;
    font-family: Arial Black, sans-serif;
    font-weight: 900;
    cursor: pointer;
    z-index: 200;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div id="bg-accent"></div>
<div id="text-container">
  <span class="word" id="w0">ESTO</span>
  <span class="word" id="w1">VA</span>
  <span class="word accent" id="w2">A</span>
  <span class="word accent underlined" id="w3">CAMBIAR</span>
  <span class="word" id="w4">TODO</span>
</div>
<button id="replay-btn" onclick="playEffect()">▶ REPLAY</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
  function playEffect() {
    var words = document.querySelectorAll('.word');
    var tl = gsap.timeline();

    // Reset all words
    gsap.set(words, { scale: 0, opacity: 0 });
    gsap.set(".word.underlined::after", { width: 0 });

    // Each word: scale(0) opacity(0) → scale(1) opacity(1) with stagger 0.12s
    tl.to(words, {
      scale: 1,
      opacity: 1,
      duration: 0.35,
      ease: "back.out(1.8)",
      stagger: 0.12
    }, 0);

    // Underline sweep on "CAMBIAR" after it appears
    // Word w3 appears at t = 3 * 0.12 = 0.36s, done at 0.71s
    tl.to({}, {
      duration: 0.01,
      onComplete: function() {
        var w = document.getElementById('w3');
        gsap.to(w, {
          '--line-width': '100%',
          duration: 0.4,
          ease: "power3.out",
          onStart: function() {
            // Animate after pseudo-element via wrapper approach
            var after = document.createElement('span');
            after.style.cssText = 'position:absolute;bottom:-10px;left:0;width:0;height:6px;background:#d2e823;display:block;';
            after.id = 'w3-line';
            w.style.position = 'relative';
            // Remove old if exists
            var old = document.getElementById('w3-line');
            if(old) old.remove();
            w.appendChild(after);
            gsap.to(after, { width: '100%', duration: 0.4, ease: "power3.out" });
          }
        });
      }
    }, 0.72);
  }

  window.addEventListener("load", function() {
    setTimeout(playEffect, 400);
  });
</script>
</body>
</html>
