<!-- Effect: film-burn | Duration: 0.8s | Energy: Medium-High | Best for: Vintage/analog aesthetic, warmth transitions, nostalgic cuts -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Film Burn</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    background: #151a28;
    overflow: hidden;
    position: relative;
  }

  #scene {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(160deg, #1a1e30 0%, #151a28 50%, #12161f 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #scene-text {
    font-family: Arial Black, sans-serif;
    font-size: 85px;
    font-weight: 900;
    color: rgba(255,255,255,0.12);
    text-align: center;
    letter-spacing: -2px;
    line-height: 1.1;
  }

  /* Film burn overlay — CSS keyframe animation */
  #burn-core {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 0;
    height: 0;
    border-radius: 50%;
    background: radial-gradient(
      circle,
      rgba(255, 255, 240, 1) 0%,
      rgba(255, 230, 140, 0.95) 8%,
      rgba(255, 200, 80, 0.88) 18%,
      rgba(255, 140, 40, 0.80) 30%,
      rgba(220, 80, 20, 0.65) 45%,
      rgba(180, 40, 10, 0.45) 60%,
      rgba(100, 20, 5, 0.25) 75%,
      transparent 100%
    );
    mix-blend-mode: screen;
    z-index: 10;
    animation: none;
  }

  /* Burn edges — halation effect */
  #burn-halo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 0;
    height: 0;
    border-radius: 50%;
    background: radial-gradient(
      circle,
      transparent 30%,
      rgba(255, 160, 60, 0.3) 50%,
      rgba(200, 80, 20, 0.5) 65%,
      rgba(140, 30, 10, 0.6) 78%,
      rgba(80, 10, 5, 0.7) 88%,
      rgba(20, 5, 2, 0.8) 95%,
      #0a0300 100%
    );
    mix-blend-mode: multiply;
    z-index: 11;
  }

  /* Burn hole — dark center that expands to black */
  #burn-hole {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 0;
    height: 0;
    border-radius: 50%;
    background: #050200;
    z-index: 12;
  }

  /* Film grain texture */
  #grain {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  /* Dark overlay that fades in after burn */
  #fade-out {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: #050200;
    opacity: 0;
    z-index: 15;
  }

  #replay-btn {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: #d2e823;
    color: #151a28;
    border: none;
    padding: 18px 48px;
    font-size: 22px;
    font-family: Arial Black, sans-serif;
    font-weight: 900;
    cursor: pointer;
    z-index: 300;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div id="scene">
  <div id="scene-text">DIRECTED<br>DECO</div>
</div>
<div id="burn-core"></div>
<div id="burn-halo"></div>
<div id="burn-hole"></div>
<div id="grain"></div>
<div id="fade-out"></div>
<button id="replay-btn" onclick="playEffect()">▶ REPLAY</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
  function playEffect() {
    var tl = gsap.timeline();

    // Reset
    gsap.set("#burn-core", { width: 0, height: 0 });
    gsap.set("#burn-halo", { width: 0, height: 0 });
    gsap.set("#burn-hole", { width: 0, height: 0 });
    gsap.set("#grain", { opacity: 0 });
    gsap.set("#fade-out", { opacity: 0 });

    // Phase 1: Hot bright core expands 0-0.2s
    tl.to("#burn-core", {
      width: 600, height: 600,
      duration: 0.2,
      ease: "power2.in"
    }, 0)

    // Phase 2: Halo follows slightly behind expanding to full radius 0.1-0.5s
    .to("#burn-halo", {
      width: 1400, height: 1400,
      duration: 0.5,
      ease: "power3.in"
    }, 0.1)

    // Grain kicks in with the burn
    .to("#grain", { opacity: 0.6, duration: 0.1, ease: "none" }, 0.1)

    // Burn hole appears and expands consuming the light
    .to("#burn-hole", {
      width: 300, height: 300,
      duration: 0.25,
      ease: "power4.in"
    }, 0.3)
    .to("#burn-hole", {
      width: 2200, height: 2200,
      duration: 0.35,
      ease: "power3.in"
    }, 0.55)

    // Core fades as hole consumes it
    .to("#burn-core", {
      opacity: 0,
      duration: 0.3,
      ease: "power2.out"
    }, 0.4)

    // Final fade to black
    .to("#fade-out", {
      opacity: 1,
      duration: 0.15,
      ease: "none"
    }, 0.7)
    .to("#grain", { opacity: 0, duration: 0.1 }, 0.75);
  }

  window.addEventListener("load", function() {
    setTimeout(playEffect, 400);
  });
</script>
</body>
</html>
