<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>CTA Pill Animated — Outro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: #0d1117; }

  .scene {
    width: 1080px;
    height: 1920px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pill-wrap {
    position: relative;
    display: inline-block;
    border-radius: 48px;
    overflow: hidden;
  }

  .pill {
    background: #d2e823;
    border-radius: 48px;
    padding: 36px 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: pointer;
  }

  .pill-text {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 55px;
    font-weight: 900;
    color: #000000;
    white-space: nowrap;
    position: relative;
    z-index: 2;
    letter-spacing: 1px;
  }

  .shimmer {
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(
      105deg,
      transparent 40%,
      rgba(255,255,255,0.55) 50%,
      transparent 60%
    );
    z-index: 3;
    pointer-events: none;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

<div class="scene">
  <div class="pill-wrap">
    <div class="pill" id="pill">
      <span class="pill-text">COTIZA GRATIS →</span>
      <div class="shimmer" id="shimmer"></div>
    </div>
  </div>
</div>

<script>
  gsap.to('#pill', {
    scale: 1.05,
    duration: 0.75,
    ease: 'sine.inOut',
    yoyo: true,
    repeat: -1,
    repeatDelay: 0
  });

  function runShimmer() {
    gsap.fromTo('#shimmer',
      { x: '-160%' },
      {
        x: '300%',
        duration: 0.65,
        ease: 'power2.out',
        onComplete: function() {
          gsap.delayedCall(2, runShimmer);
        }
      }
    );
  }

  gsap.delayedCall(0.5, runShimmer);
</script>
</body>
</html>
