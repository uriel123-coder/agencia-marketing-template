<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Countdown Opener — Intro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: #0d1117; }

  .scene {
    width: 1080px;
    height: 1920px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .number {
    position: absolute;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 400px;
    font-weight: 900;
    opacity: 0;
    transform: scale(0);
    line-height: 1;
  }

  #n3 { color: #ffffff; }
  #n2 { color: #d2e823; }
  #n1 { color: #ff4444; }
  #n0 { color: #ffffff; font-size: 500px; }

  .flash {
    position: fixed;
    top: 0; left: 0;
    width: 1080px; height: 1920px;
    background: #d2e823;
    opacity: 0;
    pointer-events: none;
    z-index: 10;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

<div class="scene">
  <div class="number" id="n3">3</div>
  <div class="number" id="n2">2</div>
  <div class="number" id="n1">1</div>
  <div class="number" id="n0">!</div>
</div>
<div class="flash" id="flash"></div>

<script>
  function popNumber(id, delay) {
    const tl = gsap.timeline({ delay });
    tl.to(id, {
      opacity: 1,
      scale: 1.5,
      duration: 0.25,
      ease: 'back.out(2)'
    })
    .to(id, {
      scale: 1,
      duration: 0.2,
      ease: 'power2.out'
    })
    .to(id, {
      opacity: 0,
      scale: 0.8,
      duration: 0.2,
      ease: 'power2.in',
      delay: 0.35
    });
  }

  popNumber('#n3', 0.3);
  popNumber('#n2', 1.1);
  popNumber('#n1', 1.9);

  const tlFinal = gsap.timeline({ delay: 2.7 });
  tlFinal.to('#n0', {
    opacity: 1,
    scale: 1.5,
    duration: 0.25,
    ease: 'back.out(2)'
  })
  .to('#n0', {
    scale: 1,
    duration: 0.2,
    ease: 'power2.out'
  })
  .to('#flash', {
    opacity: 1,
    duration: 0.08,
    ease: 'none'
  }, '-=0.1')
  .to('#flash', {
    opacity: 0,
    duration: 0.35,
    ease: 'power2.out'
  });
</script>
</body>
</html>
