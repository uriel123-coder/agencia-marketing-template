<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Price Drop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #151a28;
    font-family: 'Arial Black', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scene {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    position: relative;
  }

  /* Background glow */
  .bg-glow {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(210,232,35,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Old price container */
  .old-price-wrap {
    position: relative;
    display: inline-block;
    z-index: 2;
    margin-bottom: 20px;
  }

  .old-price {
    font-size: 90px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -2px;
    line-height: 1;
    position: relative;
    z-index: 2;
    white-space: nowrap;
  }

  /* Strikethrough: a red expanding div overlay */
  .strikethrough-bar {
    position: absolute;
    top: 50%;
    left: -10px;
    width: 0%;
    height: 8px;
    background: #E84444;
    transform: translateY(-50%) rotate(-3deg);
    z-index: 3;
    border-radius: 4px;
    box-shadow: 0 0 12px rgba(232, 68, 68, 0.6);
  }

  /* New price — starts above, drops in */
  .new-price-wrap {
    position: relative;
    z-index: 2;
    opacity: 0;
    transform: translateY(-120px);
    margin-top: 10px;
  }

  .new-price {
    font-size: 130px;
    font-weight: 900;
    color: #d2e823;
    letter-spacing: -4px;
    line-height: 1;
    white-space: nowrap;
    text-shadow:
      0 0 40px rgba(210, 232, 35, 0.5),
      0 0 80px rgba(210, 232, 35, 0.2);
  }

  /* Savings label */
  .savings-wrap {
    opacity: 0;
    margin-top: 30px;
    z-index: 2;
    position: relative;
  }

  .savings {
    font-size: 40px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.3;
  }

  .savings .highlight {
    color: #d2e823;
  }

  /* Divider pill */
  .divider-pill {
    width: 120px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 30px auto;
    opacity: 0;
    z-index: 2;
    position: relative;
  }

  /* Label tag */
  .tag {
    position: absolute;
    top: -90px;
    left: 50%;
    transform: translateX(-50%);
    background: #E84444;
    color: white;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 8px 28px;
    border-radius: 6px;
    opacity: 0;
    z-index: 5;
    white-space: nowrap;
  }

  /* Sparkle dots around new price */
  .sparkle {
    position: absolute;
    width: 8px;
    height: 8px;
    background: #d2e823;
    border-radius: 50%;
    opacity: 0;
    z-index: 3;
    box-shadow: 0 0 10px rgba(210, 232, 35, 0.8);
  }

  /* Top label */
  .top-label {
    position: fixed;
    top: 100px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    z-index: 10;
  }

  /* Bottom CTA */
  .bottom-cta {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    background: #d2e823;
    color: #151a28;
    font-size: 34px;
    font-weight: 900;
    letter-spacing: 3px;
    padding: 20px 70px;
    border-radius: 60px;
    text-transform: uppercase;
    opacity: 0;
    z-index: 10;
    white-space: nowrap;
  }

  /* Deco lines background */
  .deco-bg {
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 107px,
        rgba(255,255,255,0.02) 108px
      );
    pointer-events: none;
    z-index: 0;
  }
</style>
</head>
<body>

<div class="deco-bg"></div>
<div class="bg-glow"></div>
<div class="top-label">Precio Especial</div>

<div class="scene">

  <!-- Tag -->
  <div class="old-price-wrap">
    <div class="tag" id="tag">PRECIO ANTERIOR</div>
    <div class="old-price" id="oldPrice">$50,000 MXN</div>
    <div class="strikethrough-bar" id="strikeBar"></div>
  </div>

  <div class="divider-pill" id="dividerPill"></div>

  <!-- New price -->
  <div class="new-price-wrap" id="newPriceWrap">
    <!-- Sparkles -->
    <div class="sparkle" id="sp1" style="top:-20px; left:-30px;"></div>
    <div class="sparkle" id="sp2" style="top:-30px; right:20px;"></div>
    <div class="sparkle" id="sp3" style="bottom:-10px; left:10px;"></div>
    <div class="sparkle" id="sp4" style="top:10px; right:-25px;"></div>
    <div class="sparkle" id="sp5" style="bottom:-20px; right:50px;"></div>
    <div class="new-price">$35,000 MXN</div>
  </div>

  <!-- Savings -->
  <div class="savings-wrap" id="savingsWrap">
    <div class="savings">
      AHORRA <span class="highlight">$15,000</span> AHORA
    </div>
  </div>

</div>

<div class="bottom-cta" id="bottomCta">APROVECHAR OFERTA</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
  const master = gsap.timeline({ repeat: -1, repeatDelay: 2 });

  // 0.3s — tag appears
  master.to("#tag", { opacity: 1, duration: 0.3, ease: "power2.out" }, 0.3);

  // 0.6s — strikethrough draws left to right
  master.to("#strikeBar", {
    width: "calc(100% + 20px)",
    duration: 0.6,
    ease: "power2.inOut"
  }, 0.6);

  // Old price fades and grays
  master.to("#oldPrice", {
    color: "rgba(255,255,255,0.4)",
    duration: 0.4
  }, 0.8);

  // 1.2s — divider appears
  master.to("#dividerPill", { opacity: 1, duration: 0.3 }, 1.2);

  // 1.3s — new price drops with elastic
  master.to("#newPriceWrap", {
    opacity: 1,
    y: 0,
    duration: 0.8,
    ease: "elastic.out(1, 0.5)"
  }, 1.3);

  // Sparkles burst after price lands
  master.to(["#sp1","#sp2","#sp3","#sp4","#sp5"], {
    opacity: 1,
    scale: 1.5,
    duration: 0.2,
    stagger: 0.05,
    ease: "power2.out"
  }, 2.0);
  master.to(["#sp1","#sp2","#sp3","#sp4","#sp5"], {
    opacity: 0,
    scale: 0.5,
    duration: 0.4,
    stagger: 0.05,
    ease: "power2.in"
  }, 2.3);

  // 2.1s — savings text
  master.to("#savingsWrap", {
    opacity: 1,
    y: 0,
    duration: 0.5,
    ease: "power2.out"
  }, 2.1);

  // 2.5s — CTA button
  master.to("#bottomCta", {
    opacity: 1,
    scale: 1,
    duration: 0.4,
    ease: "back.out(1.7)"
  }, 2.5);

  // CTA subtle pulse
  master.to("#bottomCta", {
    scale: 1.04,
    duration: 0.5,
    ease: "power1.inOut",
    yoyo: true,
    repeat: 3
  }, 3.0);

  // Hold then reset
  master.to({}, { duration: 1.5 }, 4.5);
  master.to(["#tag","#dividerPill","#savingsWrap","#bottomCta"], {
    opacity: 0, duration: 0.3
  }, 6.0);
  master.to("#strikeBar", { width: "0%", duration: 0.2 }, 6.0);
  master.to("#oldPrice", { color: "#ffffff", duration: 0.2 }, 6.0);
  master.to("#newPriceWrap", { opacity: 0, y: -120, duration: 0.3 }, 6.0);
</script>
</body>
</html>
